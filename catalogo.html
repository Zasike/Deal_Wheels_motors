<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Catálogo de Autos</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<header>

    <div class="logo-area">

        <img src="img/logo.png" class="logo">

        <h1>Deal Wheels Motor</h1>

    </div>

    <nav>

        <a href="index.html">Inicio</a>

        <a href="catalogo.html">Autos</a>

        <a href="contacto.html">Contacto</a>

        <a href="login.html">Login</a>

    </nav>

</header>

<!-- FILTROS -->

<div class="filtros">

    <input
    type="text"
    id="searchInput"
    placeholder="🔎 Buscar auto..."
    onkeypress="buscarAuto(event)">

    <select id="marcaFilter" onchange="filtrarAutos()">

        <option value="">Marca</option>

        <option value="Toyota">Toyota</option>

        <option value="Ford">Ford</option>

        <option value="Chevrolet">Chevrolet</option>

        <option value="Fiat">Fiat</option>

        <option value="Peugeot">Peugeot</option>

        <option value="Volkswagen">Volkswagen</option>

        <option value="Renault">Renault</option>

        <option value="Audi">Audi</option>

        <option value="BMW">BMW</option>

        <option value="Mercedes">Mercedes</option>

    </select>

    <select id="yearFilter" onchange="filtrarAutos()">

        <option value="">Año</option>

        <option value="2018">2018</option>

        <option value="2019">2019</option>

        <option value="2020">2020</option>

        <option value="2021">2021</option>

        <option value="2022">2022</option>

        <option value="2023">2023</option>

        <option value="2024">2024</option>

        <option value="2025">2025</option>

    </select>

</div>

<!-- CATALOGO -->

<section class="cars" id="catalogoContainer">

</section>

<script src="script.js"></script>

</body>
</html>
