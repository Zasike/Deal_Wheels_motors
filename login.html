<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body class="login-body">

<div class="login-box">

    <img src="img/logo.png" class="login-logo">

    <h1>Deal Wheels Motor</h1>

    <h2>Iniciar Sesión</h2>

    <input
    type="text"
    id="user"
    placeholder="Usuario">

    <input
    type="password"
    id="pass"
    placeholder="Contraseña">

    <button onclick="login()">
        Ingresar
    </button>

    <p class="forgot">
        ¿Olvidaste tu contraseña?
    </p>

</div>

<script src="script.js"></script>

</body>

</html>
